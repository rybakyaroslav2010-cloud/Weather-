<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professionelles Live-Wetter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .weather-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
        }

        /* Suchfeld Styling */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-box input::placeholder {
            color: #ddd;
        }

        .search-box input:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .search-box button {
            background: #00c6ff;
            background: -webkit-linear-gradient(to right, #0072ff, #00c6ff);
            background: linear-gradient(to right, #0072ff, #00c6ff);
            border: none;
            color: white;
            padding: 12px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        /* Hauptwetter */
        .main-weather {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .current-day {
            font-size: 1rem;
            color: #00c6ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .temp-display {
            font-size: 4.5rem;
            font-weight: 700;
            margin: 15px 0;
        }

        /* Details Kacheln */
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .detail-item span {
            display: block;
            font-size: 0.85rem;
            color: #b0bec5;
        }

        .detail-item p {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 4px;
        }

        /* 3-Tage-Vorhersage */
        .forecast-title {
            font-size: 1.1rem;
            margin-bottom: 12px;
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 15px;
            font-weight: 600;
        }

        .forecast-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .forecast-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 15px;
            border-radius: 10px;
        }

        .forecast-day {
            font-weight: 500;
            width: 40%;
        }

        .forecast-temp {
            text-align: right;
            font-weight: bold;
            color: #00c6ff;
        }
    </style>
</head>
<body>

    <div class="weather-container">
        
        <!-- Suchfeld -->
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Stadt eingeben... (z.B. Berlin)">
            <button id="search-btn">Suchen</button>
        </div>

        <!-- Aktuelles Wetter -->
        <div class="main-weather">
            <h1 id="location">Berlin</h1>
            <div class="current-day" id="current-date">Lade Tag...</div>
            <div class="temp-display" id="temperature">--°C</div>
        </div>
        
        <!-- Zusatz-Details -->
        <div class="details">
            <div class="detail-item">
                <span>Windstärke</span>
                <p id="wind">-- km/h</p>
            </div>
            <div class="detail-item">
                <span>Luftfeuchte</span>
                <p id="humidity">-- %</p>
            </div>
        </div>

        <!-- Wochentage Vorhersage -->
        <div class="forecast-title">Vorschau für die nächsten Tage</div>
        <div class="forecast-list" id="forecast-container">
            <!-- Wird per JavaScript befüllt -->
        </div>

    </div>

    <script>
        const wochentage = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];

        // Funktion: Wetter anhand von Koordinaten abrufen
        async function holeWetter(lat, lon, stadtname) {
            try {
                // Abruf der Live-Wetterdaten & der 3-Tage-Vorhersage
                const url = `https://open-meteo.com{lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
                
                const antwort = await fetch(url);
                const daten = await antwort.json();

                // 1. Aktuellen Wochentag anzeigen
                const heute = new Date();
                document.getElementById('current-date').innerText = wochentage[heute.getDay()];

                // 2. Aktuelle Daten befüllen (garantiert in Celsius)
                document.getElementById('location').innerText = stadtname;
                document.getElementById('temperature').innerText = Math.round(daten.current.temperature_2m) + "°C";
                document.getElementById('wind').innerText = daten.current.wind_speed_10m + " km/h";
                document.getElementById('humidity').innerText = daten.current.relative_humidity_2m + " %";

                // 3. Vorhersage für die Wochentage bauen
                const forecastContainer = document.getElementById('forecast-container');
                forecastContainer.innerHTML = ""; // Altes leeren

                // Wir schleifen durch die nächsten 3 Tage (Index 1, 2, 3 – da 0 heute ist)
                for (let i = 1; i <= 3; i++) {
                    const künftigesDatum = new Date();
                    künftigesDatum.setDate(heute.getDate() + i);
                    const tagName = wochentage[künftigesDatum.getDay()];

                    const maxTemp = Math.round(daten.daily.temperature_2m_max[i]);
                    const minTemp = Math.round(daten.daily.temperature_2m_min[i]);

                    const zeile = `
                        <div class="forecast-row">
                            <span class="forecast-day">${tagName}</span>
                            <span class="forecast-temp">${maxTemp}°C / ${minTemp}°C</span>
                        </div>
                    `;
                    forecastContainer.innerHTML += zeile;
                }

            } catch (fehler) {
                console.error("Fehler beim Abrufen der Wetterdaten:", fehler);
                document.getElementById('location').innerText = "Stadt nicht gefunden";
            }
        }

        // Funktion: Suchbegriff in Koordinaten umwandeln (Geocoding)
        async function sucheStadt() {
            const stadt = document.getElementById('search-input').value.trim();
            if (!stadt) return;

            try {
                const geoUrl = `https://open-meteo.com{encodeURIComponent(stadt)}&count=1&language=de&format=json`;
                const antwort = await fetch(geoUrl);
                const daten = await antwort.json();

                if (daten.results && daten.results.length > 0) {
                    const treffer = daten.results[0];
                    // Neues Wetter für die gefundene Stadt laden
                    holeWetter(treffer.latitude, treffer.longitude, treffer.name);
                } else {
                    alert("Stadt wurde leider nicht gefunden. Bitte Schreibweise prüfen!");
                }
            } catch (fehler) {
                console.error("Fehler bei der Stadtsuche:", fehler);
            }
        }

        // Event-Listener für Button und Enter-Taste
        document.getElementById('search-btn').addEventListener('click', sucheStadt);
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sucheStadt();
        });

        // Beim ersten Laden direkt Berlin anzeigen
        holeWetter(52.52, 13.40, "Berlin");
    </script>

</body>
</html>
